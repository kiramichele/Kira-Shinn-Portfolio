<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Build It Right — Game Design Branching Scenario</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #07070f;
      --surface:   #0e0e1a;
      --border:    rgba(255,255,255,0.08);
      --text:      #dddde8;
      --muted:     #7878a0;
      --accent:    #f7622a;
      --accent-dim:#7a2e12;
      --teal:      #3fdcb8;
      --teal-dim:  #0d3329;
      --red:       #e84040;
      --red-dim:   #330d0d;
      --font-head: 'Syne', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 15px;
      line-height: 1.65;
    }

    /* ── dot-grid background ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.055) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── layout ── */
    #app {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 16px 60px;
    }

    /* ── top bar ── */
    .topbar {
      width: 100%;
      max-width: 760px;
      padding: 28px 0 0;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .topbar-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .module-label {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .step-label {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.08em;
      color: var(--accent);
    }
    .progress-track {
      width: 100%;
      height: 3px;
      background: rgba(255,255,255,0.06);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.5s cubic-bezier(.4,0,.2,1);
    }

    /* ── card ── */
    .card {
      width: 100%;
      max-width: 760px;
      margin-top: 36px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      animation: fadeSlide 0.45s cubic-bezier(.4,0,.2,1) both;
    }
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-tag {
      display: inline-block;
      padding: 3px 10px;
      background: rgba(247,98,42,0.14);
      border: 1px solid rgba(247,98,42,0.3);
      border-radius: 4px;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      font-family: var(--font-mono);
      margin-bottom: 12px;
    }

    /* ── intro screen ── */
    .intro-inner {
      padding: 56px 52px 52px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .intro-inner h1 {
      font-family: var(--font-head);
      font-size: clamp(28px, 5vw, 44px);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.02em;
      color: #fff;
    }
    .intro-inner h1 span { color: var(--accent); }
    .intro-inner p {
      color: var(--muted);
      max-width: 480px;
      font-size: 14px;
    }
    .objectives {
      margin-top: 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .obj-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 13px;
      color: var(--text);
    }
    .obj-item::before {
      content: '→';
      color: var(--teal);
      flex-shrink: 0;
      margin-top: 1px;
    }
    .obj-label {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }

    /* ── scene screen ── */
    .scene-header {
      padding: 28px 40px 0;
    }
    .scene-title {
      font-family: var(--font-head);
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 20px;
    }
    .situation-block {
      background: rgba(255,255,255,0.025);
      border-left: 3px solid var(--accent);
      border-radius: 0 8px 8px 0;
      padding: 16px 18px;
      font-size: 14px;
      color: var(--text);
      line-height: 1.7;
      margin-bottom: 18px;
    }
    .situation-block em { color: #c8c8d8; font-style: italic; }
    .dialogue-block {
      display: flex;
      gap: 14px;
      align-items: flex-start;
      background: rgba(63,220,184,0.05);
      border: 1px solid rgba(63,220,184,0.12);
      border-radius: 10px;
      padding: 14px 18px;
      margin-bottom: 24px;
    }
    .dialogue-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--teal), #1a7f68);
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
    }
    .dialogue-body {}
    .dialogue-name {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--teal);
      margin-bottom: 4px;
    }
    .dialogue-text {
      font-family: var(--font-mono);
      font-size: 13px;
      font-style: italic;
      color: #b8e8df;
      line-height: 1.6;
    }
    .question-text {
      font-family: var(--font-head);
      font-size: 17px;
      font-weight: 600;
      color: #fff;
      padding: 0 40px 18px;
    }

    /* ── choices ── */
    .choices {
      display: flex;
      flex-direction: column;
      padding: 0 28px 32px;
      gap: 10px;
    }
    .choice-btn {
      position: relative;
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 16px 20px;
      background: rgba(255,255,255,0.025);
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      text-align: left;
      color: var(--text);
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
      font-family: inherit;
    }
    .choice-btn:hover {
      border-color: rgba(247,98,42,0.5);
      background: rgba(247,98,42,0.06);
      transform: translateX(3px);
    }
    .choice-btn:active { transform: translateX(1px); }
    .choice-letter {
      width: 28px; height: 28px;
      border-radius: 6px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      flex-shrink: 0;
      margin-top: 1px;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }
    .choice-btn:hover .choice-letter {
      background: rgba(247,98,42,0.2);
      border-color: var(--accent);
      color: var(--accent);
    }
    .choice-main { font-size: 14px; color: var(--text); line-height: 1.5; }
    .choice-sub  { font-size: 12px; color: var(--muted); font-style: italic; margin-top: 3px; }

    /* ── feedback screen ── */
    .feedback-inner { padding: 40px 44px 44px; }
    .feedback-icon {
      width: 52px; height: 52px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      margin-bottom: 20px;
    }
    .feedback-icon.correct { background: rgba(63,220,184,0.12); border: 2px solid var(--teal); }
    .feedback-icon.wrong   { background: rgba(232,64,64,0.12);  border: 2px solid var(--red); }

    .feedback-title {
      font-family: var(--font-head);
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 14px;
      color: #fff;
    }
    .feedback-title.correct { color: var(--teal); }
    .feedback-title.wrong   { color: var(--red); }

    .feedback-explanation {
      font-size: 14px;
      color: var(--text);
      line-height: 1.8;
      margin-bottom: 24px;
    }
    .feedback-explanation strong { color: #fff; }

    .principle-box {
      display: flex;
      gap: 14px;
      background: rgba(247,98,42,0.07);
      border: 1px solid rgba(247,98,42,0.2);
      border-radius: 10px;
      padding: 16px 20px;
      margin-bottom: 28px;
    }
    .principle-icon { font-size: 18px; flex-shrink: 0; }
    .principle-label {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 3px;
    }
    .principle-name { font-family: var(--font-head); font-size: 15px; font-weight: 700; color: #fff; }
    .principle-desc { font-size: 13px; color: var(--muted); margin-top: 3px; }

    /* ── end screen ── */
    .end-inner { padding: 52px 44px; }
    .end-inner h2 {
      font-family: var(--font-head);
      font-size: 32px;
      font-weight: 800;
      color: #fff;
      margin-bottom: 8px;
    }
    .end-inner h2 span { color: var(--teal); }
    .end-subtitle { color: var(--muted); font-size: 14px; margin-bottom: 36px; }
    .principles-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
      margin-bottom: 36px;
    }
    .principle-card {
      display: flex;
      gap: 16px;
      padding: 18px 20px;
      background: rgba(255,255,255,0.025);
      border: 1px solid var(--border);
      border-radius: 12px;
      animation: fadeSlide 0.4s both;
    }
    .principle-card:nth-child(2) { animation-delay: 0.1s; }
    .principle-card:nth-child(3) { animation-delay: 0.2s; }
    .p-num {
      font-family: var(--font-head);
      font-size: 32px;
      font-weight: 800;
      color: rgba(247,98,42,0.3);
      line-height: 1;
      flex-shrink: 0;
      width: 40px;
    }
    .p-title {
      font-family: var(--font-head);
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 4px;
    }
    .p-desc { font-size: 13px; color: var(--muted); line-height: 1.6; }

    /* ── buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 13px 28px;
      border-radius: 8px;
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: transform 0.15s, opacity 0.15s;
      text-decoration: none;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { opacity: 0.88; }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .btn-outline:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }
    .btn-teal {
      background: var(--teal);
      color: #07070f;
    }
    .btn-teal:hover { opacity: 0.88; }

    .btn-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

    /* ── score tracker (topbar) ── */
    .score-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 11px;
      letter-spacing: 0.06em;
      color: var(--muted);
    }
    .score-pill .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted);
    }
    .score-pill .dot.hit  { background: var(--teal); }
    .score-pill .dot.miss { background: var(--red); }

    /* ── end screen score summary ── */
    .score-summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 28px;
    }
    .score-stat {
      background: rgba(255,255,255,0.025);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 16px;
      text-align: center;
    }
    .score-stat.highlight { border-color: rgba(63,220,184,0.3); background: rgba(63,220,184,0.05); }
    .score-big {
      font-family: var(--font-head);
      font-size: 36px;
      font-weight: 800;
      color: #fff;
      line-height: 1;
      margin-bottom: 6px;
    }
    .score-big.perfect { color: var(--teal); }
    .score-big.good    { color: var(--accent); }
    .score-label { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }

    .scene-breakdown {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 28px;
    }
    .breakdown-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
    }
    .breakdown-scene { color: var(--muted); flex: 1; }
    .breakdown-badge {
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.06em;
    }
    .badge-first { background: rgba(63,220,184,0.12); color: var(--teal); border: 1px solid rgba(63,220,184,0.25); }
    .badge-retry { background: rgba(247,98,42,0.12); color: var(--accent); border: 1px solid rgba(247,98,42,0.25); }

    /* ── shake animation ── */
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-6px); }
      40%      { transform: translateX(6px); }
      60%      { transform: translateX(-4px); }
      80%      { transform: translateX(4px); }
    }
    .shake { animation: shake 0.4s ease both; }

    /* ── responsive ── */
    @media (max-width: 600px) {
      .intro-inner, .feedback-inner, .end-inner { padding: 32px 28px; }
      .scene-header { padding: 22px 22px 0; }
      .question-text { padding: 0 22px 14px; }
      .choices { padding: 0 16px 24px; }
    }
  </style>
</head>
<body>
<div id="app"></div>

<script>
/* ═══════════════════════════════════════════
   SCENARIO DATA
═══════════════════════════════════════════ */
const PRINCIPLES = [
  {
    title: 'Core Mechanic First',
    desc: 'Prototype your core gameplay loop before building environments, UI, or additional systems. Everything else in the game depends on what the player fundamentally does.'
  },
  {
    title: 'Game Feel Before Scope',
    desc: 'Audio feedback, particle effects, and camera reactions transform a functional mechanic into a satisfying one. Polish the core before expanding it.'
  },
  {
    title: 'Scope Is a Design Decision',
    desc: 'Cutting features intentionally — called "scoping" — is a professional skill, not a failure. A polished small game consistently outperforms a broken large one.'
  }
];

const SCENES = {
  intro: { type: 'intro' },

  s1: {
    type: 'scene',
    step: 1, total: 3,
    title: 'Scene 1 — Starting Your Project',
    situation: 'Your teacher has just assigned a 3-week Unity game project. You open your laptop, Unity is loading, and you\'re staring at a blank scene. Before you closed the classroom door, your teacher said: <em>"Start smart, or start over."</em>',
    character: 'Ms. Reyes',
    avatar: '👩‍💻',
    dialogue: '"You have three weeks. Every hour spent on the wrong thing is an hour you can\'t get back. What\'s your very first move?"',
    question: 'What do you tackle first?',
    choices: [
      { letter:'A', text:'Open the scene view and build the game environment', sub:'"I\'ll design mechanics once I can see the world."', next:'s1_fa', correct:false },
      { letter:'B', text:'Prototype the core mechanic — just get the player moving', sub:'"Everything else in the game builds on this."', next:'s2', correct:true },
      { letter:'C', text:'Design all UI screens first (main menu, HUD, pause menu)', sub:'"Players need to navigate the game — UI should come first."', next:'s1_fc', correct:false }
    ]
  },

  s1_fa: {
    type: 'feedback', correct: false,
    title: 'Scope Trap!',
    explanation: 'Building environments before your mechanic is playable is one of the most common beginner mistakes in Unity. You can spend hours crafting a beautiful world that completely breaks once you figure out how your player actually moves — the scale is wrong, the geometry doesn\'t fit the jump arc, and you have to rebuild it anyway.\n\n<strong>The core mechanic drives everything else.</strong> Level scale, environment design, and UI all depend on what the player fundamentally does. Build that first.',
    principle: 0, retry: 's1'
  },
  s1_fc: {
    type: 'feedback', correct: false,
    title: 'Cart Before the Horse',
    explanation: 'UI should reflect your mechanic — not define it. Designing menus and HUD elements before you know what the player actually does means you\'ll almost certainly redesign all of it later once the mechanic is real.\n\nIn Unity, the golden order is: <strong>mechanic → level → UI</strong>. The HUD needs to know what information matters; that only becomes clear once your mechanic is running.',
    principle: 0, retry: 's1'
  },

  s2: {
    type: 'scene',
    step: 2, total: 3,
    title: 'Scene 2 — Something Is Missing',
    situation: 'Week 1 done. Your core mechanic works — it\'s a platformer and the player can jump and land. But every classmate who playtests gives you the same feedback: <em>"It feels empty."</em> One of them says, <em>"Like jumping on cardboard."</em>',
    character: 'Playtester (your classmate)',
    avatar: '🎮',
    dialogue: '"The jumping works, but it doesn\'t feel like anything. It\'s just... there. There\'s no weight to it."',
    question: 'What do you do to fix this?',
    choices: [
      { letter:'A', text:'Add three new mechanics: double jump, wall jump, and a dash', sub:'"More mechanics will make it more exciting."', next:'s2_fa', correct:false },
      { letter:'B', text:'Add a landing sound, a screen shake, and a dust particle on impact', sub:'"Make the existing mechanic feel satisfying first."', next:'s3', correct:true },
      { letter:'C', text:'Move straight to building levels', sub:'"Better level design will make the game more fun."', next:'s2_fc', correct:false }
    ]
  },

  s2_fa: {
    type: 'feedback', correct: false,
    title: 'Feature Creep Alert',
    explanation: 'Adding more mechanics before polishing your core one is called <strong>feature creep</strong> — and it\'s one of the most common reasons student games feel unfinished. Adding a double jump, wall jump, and dash all at once introduces three new bugs, three new balancing problems, and three new things the player has to learn.\n\n<em>Juice it before you expand it.</em> Nail the feel of the single jump first, then decide if more mechanics are actually needed.',
    principle: 1, retry: 's2'
  },
  s2_fc: {
    type: 'feedback', correct: false,
    title: 'Levels Won\'t Save You',
    explanation: 'If the core mechanic doesn\'t feel good, more levels just give the player more space to notice the emptiness. The problem isn\'t level design — it\'s <strong>game feel</strong>.\n\nGame feel is the micro-feedback system: the sound when you land, the camera shake, the dust particle, the subtle squash-and-stretch. These are what make a simple action satisfying to repeat. Get the feel right, then build levels around it.',
    principle: 1, retry: 's2'
  },

  s3: {
    type: 'scene',
    step: 3, total: 3,
    title: 'Scene 3 — Scope Creep Crisis',
    situation: 'It\'s week 2. Your original design doc listed 10 features. You\'ve completed 3. Demo day is one week away, and your teacher is checking in tomorrow. You do the math — <em>you cannot finish everything.</em>',
    character: 'Your Design Doc',
    avatar: '📋',
    dialogue: '"10 features planned. 3 features done. 7 remaining. 7 days left. One demo in front of the class."',
    question: 'What do you do?',
    choices: [
      { letter:'A', text:'Work nights and weekends to finish all 10 features', sub:'"I can\'t demo an incomplete game."', next:'s3_fa', correct:false },
      { letter:'B', text:'Cut to 5 features, polish what you have, and ship a tight experience', sub:'"A polished small game beats a broken big one."', next:'end', correct:true },
      { letter:'C', text:'Add a loading screen and placeholder art to make it look more finished', sub:'"Presentation can hide the gaps."', next:'s3_fc', correct:false }
    ]
  },

  s3_fa: {
    type: 'feedback', correct: false,
    title: 'Crunch Doesn\'t Work',
    explanation: 'Crunch — working unsustainable hours to meet a deadline — is a documented problem across the games industry that rarely produces quality results. A rushed game with 10 half-finished features is almost always <em>less</em> impressive than a tight, polished game with 5.\n\n<strong>Scoping is a professional skill, not a failure.</strong> Producers, designers, and directors cut features all the time. The ability to recognize what\'s achievable and deliver it well is exactly what studios hire for.',
    principle: 2, retry: 's3'
  },
  s3_fc: {
    type: 'feedback', correct: false,
    title: 'Polish ≠ Decoration',
    explanation: 'A loading screen and placeholder art don\'t add gameplay value — and experienced reviewers will see through them immediately. Decoration is not the same as polish.\n\n<strong>Real polish comes from refining what works.</strong> A tight, complete experience with rough visuals beats a decorated, broken one every single time. Focus on making your 5 best features feel finished.',
    principle: 2, retry: 's3'
  },

  end: { type: 'end' }
};

/* ═══════════════════════════════════════════
   SCORE STATE
═══════════════════════════════════════════ */
// sceneAttempts: { s1: 1, s2: 2, s3: 1 }  (1 = first try, 2+ = retried)
let sceneAttempts = {};
let currentSceneId = null; // tracks which scene the player is currently on

function resetScore() {
  sceneAttempts = {};
  currentSceneId = null;
}

function recordAttempt(sceneId, correct) {
  if (!sceneAttempts[sceneId]) sceneAttempts[sceneId] = 0;
  sceneAttempts[sceneId]++;
}

function totalAttempts()  { return Object.values(sceneAttempts).reduce((a,b) => a+b, 0); }
function totalMistakes()  { return totalAttempts() - 3; } // 3 scenes = 3 correct answers
function firstTryCount()  { return Object.values(sceneAttempts).filter(v => v === 1).length; }

function getRating() {
  const m = totalMistakes();
  if (m === 0) return { label: 'Perfect Run', color: 'perfect' };
  if (m <= 2)  return { label: 'Solid Work',  color: 'good'    };
  return        { label: 'Keep Practicing', color: ''         };
}

/* ═══════════════════════════════════════════
   RENDER ENGINE
═══════════════════════════════════════════ */
let currentScene = 'intro';

function go(id) {
  currentScene = id;
  const scene = SCENES[id];
  // Track which decision scene we're on
  if (scene.type === 'scene') currentSceneId = id;
  // Reset score when restarting from intro
  if (id === 'intro') resetScore();
  render();
}

function render() {
  const scene = SCENES[currentScene];
  const app = document.getElementById('app');
  app.innerHTML = buildTopbar(scene) + buildCard(scene);
}

function buildTopbar(scene) {
  if (scene.type === 'intro') return '';
  if (scene.type === 'end')   return '';

  const step  = scene.step  || 0;
  const total = scene.total || 3;
  const pct   = scene.type === 'feedback' ? (step / total * 100) : ((step - 1) / total * 100);

  // Build dot indicators: one per scene
  const sceneKeys = ['s1','s2','s3'];
  const dots = sceneKeys.map(k => {
    const a = sceneAttempts[k];
    if (!a) return `<span class="dot"></span>`;
    return `<span class="dot ${a === 1 ? 'hit' : 'miss'}"></span>`;
  }).join('');

  const mistakes = totalMistakes();
  const mistakeLabel = mistakes === 0 ? 'No mistakes' : `${mistakes} mistake${mistakes !== 1 ? 's' : ''}`;

  return `
    <div class="topbar">
      <div class="topbar-row">
        <span class="module-label">GD-101 · Branching Scenario</span>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="score-pill">${dots}</div>
          <span class="score-pill">${mistakeLabel}</span>
          ${scene.step ? `<span class="step-label">Scene ${step} / ${total}</span>` : ''}
        </div>
      </div>
      <div class="progress-track">
        <div class="progress-fill" style="width:${pct}%"></div>
      </div>
    </div>`;
}

function buildCard(scene) {
  if (scene.type === 'intro')    return buildIntro();
  if (scene.type === 'scene')    return buildScene(scene);
  if (scene.type === 'feedback') return buildFeedback(scene);
  if (scene.type === 'end')      return buildEnd();
  return '';
}

/* ── INTRO ── */
function buildIntro() {
  return `
  <div class="card">
    <div class="intro-inner">
      <span class="card-tag">Interactive Scenario</span>
      <h1>Build It <span>Right.</span></h1>
      <p>You're a game design student with a Unity project due in 3 weeks. Every decision you make shapes your final game — and your grade.</p>
      <div class="obj-label" style="margin-top:4px">Learning Objectives</div>
      <div class="objectives">
        <div class="obj-item">Identify the correct sequence of game development tasks</div>
        <div class="obj-item">Recognize the role of game feel in player experience</div>
        <div class="obj-item">Apply professional scope management techniques</div>
      </div>
      <div style="margin-top:16px">
        <button class="btn btn-primary" onclick="go('s1')">Begin Scenario →</button>
      </div>
    </div>
  </div>`;
}

/* ── SCENE ── */
function buildScene(scene) {
  const choices = scene.choices.map(c => `
    <button class="choice-btn" onclick="handleChoice('${c.next}', ${c.correct})">
      <div class="choice-letter">${c.letter}</div>
      <div>
        <div class="choice-main">${c.text}</div>
        <div class="choice-sub">${c.sub}</div>
      </div>
    </button>`).join('');

  return `
  <div class="card">
    <div class="scene-header">
      <div class="scene-title">${scene.title}</div>
      <div class="situation-block">${scene.situation}</div>
      <div class="dialogue-block">
        <div class="dialogue-avatar">${scene.avatar}</div>
        <div class="dialogue-body">
          <div class="dialogue-name">${scene.character}</div>
          <div class="dialogue-text">${scene.dialogue}</div>
        </div>
      </div>
    </div>
    <div class="question-text">${scene.question}</div>
    <div class="choices">${choices}</div>
  </div>`;
}

/* ── FEEDBACK ── */
function buildFeedback(scene) {
  const p = PRINCIPLES[scene.principle];
  const isCorrect = scene.correct;
  const icon = isCorrect ? '✓' : '✗';
  const btnLabel = isCorrect ? 'Continue →' : 'Try Again';
  const btnNext  = isCorrect ? scene.next : scene.retry;
  const btnClass = isCorrect ? 'btn-teal' : 'btn-primary';

  // format multi-paragraph explanation
  const paragraphs = scene.explanation
    .split('\n\n')
    .map(p => `<p>${p}</p>`)
    .join('');

  return `
  <div class="card">
    <div class="feedback-inner">
      <div class="feedback-icon ${isCorrect ? 'correct' : 'wrong'}">${icon}</div>
      <div class="feedback-title ${isCorrect ? 'correct' : 'wrong'}">${scene.title}</div>
      <div class="feedback-explanation">${paragraphs}</div>
      <div class="principle-box">
        <div class="principle-icon">💡</div>
        <div>
          <div class="principle-label">Design Principle</div>
          <div class="principle-name">${p.title}</div>
          <div class="principle-desc">${p.desc}</div>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn ${btnClass}" onclick="go('${btnNext}')">${btnLabel}</button>
      </div>
    </div>
  </div>`;
}

/* ── END ── */
function buildEnd() {
  const rating   = getRating();
  const mistakes = totalMistakes();
  const firstTry = firstTryCount();

  const statCards = `
    <div class="score-stat highlight">
      <div class="score-big ${rating.color}">${mistakes === 0 ? '★' : mistakes}</div>
      <div class="score-label">${mistakes === 0 ? 'Perfect Run' : `Mistake${mistakes !== 1 ? 's' : ''}`}</div>
    </div>
    <div class="score-stat">
      <div class="score-big" style="color:var(--teal)">${firstTry}</div>
      <div class="score-label">First Try</div>
    </div>
    <div class="score-stat">
      <div class="score-big">${totalAttempts()}</div>
      <div class="score-label">Total Attempts</div>
    </div>`;

  const sceneLabels = { s1: 'Scene 1 — Core Mechanic', s2: 'Scene 2 — Game Feel', s3: 'Scene 3 — Scope' };
  const breakdown = ['s1','s2','s3'].map(k => {
    const a = sceneAttempts[k] || 1;
    const label = a === 1 ? 'First Try ✓' : `${a} Attempts`;
    const cls   = a === 1 ? 'badge-first' : 'badge-retry';
    return `
      <div class="breakdown-row">
        <span class="breakdown-scene">${sceneLabels[k]}</span>
        <span class="breakdown-badge ${cls}">${label}</span>
      </div>`;
  }).join('');

  const principleCards = PRINCIPLES.map((p, i) => `
    <div class="principle-card">
      <div class="p-num">0${i+1}</div>
      <div>
        <div class="p-title">${p.title}</div>
        <div class="p-desc">${p.desc}</div>
      </div>
    </div>`).join('');

  return `
  <div class="card" style="margin-top:48px">
    <div class="end-inner">
      <div class="card-tag">Scenario Complete</div>
      <h2>You built it <span>right.</span></h2>
      <p class="end-subtitle" style="margin-bottom:20px">${rating.label} — here's how you did:</p>

      <div class="score-summary">${statCards}</div>
      <div class="scene-breakdown">${breakdown}</div>

      <p class="end-subtitle" style="margin-bottom:14px">Principles covered:</p>
      <div class="principles-grid">${principleCards}</div>

      <div class="btn-row" style="margin-top:8px">
        <button class="btn btn-primary" onclick="go('intro')">Restart Scenario</button>
        <button class="btn btn-outline"  onclick="reviewMode()">Review Principles</button>
      </div>
    </div>
  </div>`;
}

/* ── CHOICE HANDLER ── */
function handleChoice(nextId, correct) {
  // Record the attempt for the current scene
  if (currentSceneId) recordAttempt(currentSceneId, correct);

  if (!correct) {
    const btns = document.querySelectorAll('.choice-btn');
    btns.forEach(b => { b.classList.add('shake'); setTimeout(() => b.classList.remove('shake'), 420); });
  }
  setTimeout(() => go(nextId), correct ? 180 : 320);
}

/* ── REVIEW MODE ── */
function reviewMode() {
  const app = document.getElementById('app');
  const cards = PRINCIPLES.map((p, i) => `
    <div class="principle-card" style="animation-delay:${i*0.1}s">
      <div class="p-num">0${i+1}</div>
      <div>
        <div class="p-title">${p.title}</div>
        <div class="p-desc">${p.desc}</div>
      </div>
    </div>`).join('');

  app.innerHTML = `
  <div class="card" style="margin-top:48px;max-width:760px;width:100%">
    <div class="end-inner">
      <div class="card-tag">Quick Reference</div>
      <h2 style="font-size:26px;margin-bottom:6px">Game Design <span>Principles</span></h2>
      <p class="end-subtitle">From the "Build It Right" scenario</p>
      <div class="principles-grid">${cards}</div>
      <button class="btn btn-outline" onclick="go('end')">← Back</button>
    </div>
  </div>`;
}

/* ── INIT ── */
render();
</script>
</body>
</html>
